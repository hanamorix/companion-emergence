name = "kindled-relay"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "kindled-relay"
database_id = "d4d129df-0541-4942-8b18-97ceb168124f"

# CF native fixed-window rate limiting (free). 60 requests / 60s per key.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }
